name: Build & Release

on:
  push:
    branches: [main, codex/improve-browser-for-advanced-console-o7cpur]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Read Metadata
        id: metadata
        run: |
          NAME=$(jq -r '.release_name' metadata.json)
          BODY=$(jq -r '.release_body' metadata.json)
          PRE=$(jq -r '.is_prerelease' metadata.json)
          APK_NAME=$(jq -r '.apk_name' metadata.json)
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "pre=$PRE" >> $GITHUB_OUTPUT
          echo "apk_custom_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Locate and Rename APK
        id: apk
        run: |
          ORIGINAL_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          NEW_NAME="${{ steps.metadata.outputs.apk_custom_name }}"
          NEW_PATH="app/build/outputs/apk/debug/$NEW_NAME"
          
          mv "$ORIGINAL_PATH" "$NEW_PATH"
          
          echo "path=$NEW_PATH" >> $GITHUB_OUTPUT

      - name: Determine release info
        id: info
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "title=${{ steps.metadata.outputs.name }} $TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=latest-build" >> $GITHUB_OUTPUT
            echo "title=${{ steps.metadata.outputs.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.title }}
          prerelease: ${{ steps.metadata.outputs.pre }}
          body: ${{ steps.metadata.outputs.body }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
